server {
    listen 80;
    server_name wsm.dahanda.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wsm.dahanda.dev;

    ssl_certificate /etc/letsencrypt/live/wsm.dahanda.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wsm.dahanda.dev/privkey.pem;

    client_max_body_size 512M;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    set $cors_origin "";
    if ($http_origin ~* ^https://(www\.)?dahanda\.dev$) {
        set $cors_origin $http_origin;
    }
    if ($http_origin ~* ^https://([a-z0-9-]+\.)?vercel\.app$) {
        set $cors_origin $http_origin;
    }
    if ($http_origin ~* ^http://localhost:(3000|3010)$) {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, x-openai-api-key" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Type" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location /generated/creative/ {
        alias /srv/dahanda/creative/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000";
    }

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
